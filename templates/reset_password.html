<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - INTOPS 설비점검 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/logo.png" type="image/png">
</head>
<body>
  <div class="page-wrap">
    <div class="card">

      <div class="card-header">
        <div class="card-icon" style="font-size:2rem;">🔐</div>
        <div class="card-title">새 비밀번호 설정</div>
        <div class="card-desc">사용할 새 비밀번호를 입력하세요 (6자 이상)</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>새 비밀번호</label>
          <input type="password" name="password" placeholder="새 비밀번호 (6자 이상)" minlength="6" required autofocus>
        </div>
        <div class="form-group">
          <label>비밀번호 확인</label>
          <input type="password" name="password_confirm" placeholder="비밀번호를 다시 입력" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary">비밀번호 재설정</button>
      </form>

    </div>
  </div>
</body>
</html>
