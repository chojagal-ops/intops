<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 - INTOPS 설비점검 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/logo.png" type="image/png">
</head>
<body>
  <div class="page-wrap">
    <div class="card">

      <div class="card-header">
        <div class="card-icon">
          <img src="/static/logo.png" alt="INTOPS" style="width:64px;height:64px;border-radius:12px;object-fit:cover;">
        </div>
        <div class="card-title">비밀번호 찾기</div>
        <div class="card-desc">가입 시 등록한 이메일로 인증번호를 발송합니다</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>이메일 주소</label>
          <input type="email" name="email" placeholder="가입 시 등록한 이메일" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary">인증번호 발송</button>
      </form>

      <hr class="divider">
      <a href="/login" class="btn btn-outline">로그인으로 돌아가기</a>

    </div>
  </div>
</body>
</html>
