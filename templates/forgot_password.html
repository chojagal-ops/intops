<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 - INTOPS 설비점검 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/logo.png" type="image/png">
</head>
<body>
  <div class="page-wrap">
    <div class="card">

      <div class="card-header">
        <div class="card-icon">
          <img src="/static/logo.png" alt="INTOPS" style="width:64px;height:64px;border-radius:12px;object-fit:cover;">
        </div>
        <div class="card-title">비밀번호 찾기</div>
        <div class="card-desc">가입 시 등록한 사번과 이름을 입력하세요</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>사번 (아이디)</label>
          <input type="text" name="employee_id" placeholder="가입 시 등록한 사번" required autofocus>
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="가입 시 등록한 이름" required>
        </div>
        <button type="submit" class="btn btn-primary">인증번호 받기</button>
      </form>

      <div style="margin-top:14px; padding:12px 16px; background:var(--bg-subtle);
                  border-radius:8px; font-size:0.8rem; color:var(--text-sub); line-height:1.6;">
        💡 이메일이 등록되어 있으면 인증번호가 이메일로 발송됩니다.<br>
        이메일이 없거나 발송이 안 될 경우 인증번호가 화면에 표시됩니다.
      </div>

      <hr class="divider">
      <a href="/login" class="btn btn-outline">로그인으로 돌아가기</a>

    </div>
  </div>
</body>
</html>
