services:
  - type: web
    name: intops
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intops-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: intops-db
    plan: free
