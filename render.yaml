services:
  - type: web
    name: intops-3
    env: python
    buildCommand: (apt-get install -y fonts-nanum || echo "fonts-nanum skip") && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intops-3-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: intops-3-db
    plan: free
